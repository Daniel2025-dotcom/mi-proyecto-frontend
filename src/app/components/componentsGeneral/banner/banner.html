<div class="banner">
  <button class="nav-btn left" (click)="previous()">
    ❮
  </button>
  
  <div class="carousel-container">
    @for (img of imgs; track $index) {
      <img 
        [src]="img" 
        alt="Banner" 
        [class.active]="$index === currentIndex">
    }
  </div>

  <button class="nav-btn right" (click)="next()">
    ❯
  </button>
</div>
