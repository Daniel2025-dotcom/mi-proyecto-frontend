<div class="card-product">
  <div class="image-container">
    <img [src]="dateProducts.url || 'https://placehold.co/200'" [alt]="dateProducts.name" alt="none">
  </div>

  <div class="info">
    <h3>{{ dateProducts.name }}</h3>
    <span class="price">${{ dateProducts.price }}</span>

    <div class="actions">
      <button class="btn btn-modify" (click)="onModify()">
        Modificar
      </button>
      <button class="btn btn-delete" (click)="onDelete()">
        Eliminar
      </button>
    </div>
  </div>
</div>
