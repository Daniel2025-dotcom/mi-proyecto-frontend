<div class="general">
    <div class="products">
        @if (products$ | async; as products) {
            @for (item of products; track item.id) {
                @if (isAdmin) {
                    <app-product [dateProducts]="item"></app-product> 
                } @else {
                    <app-productUser [dateProducts]="item"></app-productUser>
                }
            }
        }
    </div>
</div>
